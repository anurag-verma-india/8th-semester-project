pipelines:
  default:
    - step:
        name: Install Dependencies
        image: node:18
        script:
          - npm install

    - step:
        name: Semgrep Scan
        image: semgrep/semgrep:latest
        script:
          - semgrep scan . --config "p/default" --json --output semgrep-results.json
        artifacts:
          - semgrep-results.json
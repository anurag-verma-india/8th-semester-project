
pipelines:
  branches:
    main:
    - step:
        name: Accuknox SAST
        script:
          - pipe: accu-knox/scan:2.1.0
            variables:
              SCAN_TYPE: SAST
              SOFT_FAIL: "true"
              ACCUKNOX_TOKEN: ${ACCUKNOX_TOKEN}
              ACCUKNOX_ENDPOINT: ${ACCUKNOX_ENDPOINT}
              ACCUKNOX_LABEL: ${ACCUKNOX_LABEL}
    - step:
        name: Container Scan
        services:
          - docker
        script:
          - export IMAGE_NAME="bitbucket"
          - export TAG="test"
          - docker build -t $IMAGE_NAME:$TAG .
          - pipe: accu-knox/scan:2.1.0
            variables:
              SCAN_TYPE: CONTAINER
              SOFT_FAIL: "true"
              IMAGE_NAME: $IMAGE_NAME
              TAG: $TAG
              ACCUKNOX_TOKEN: ${ACCUKNOX_TOKEN}
              ACCUKNOX_ENDPOINT: ${ACCUKNOX_ENDPOINT}
              ACCUKNOX_LABEL: ${ACCUKNOX_LABEL}

